name: Build FFmpeg for Android
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # Install tools
          sudo apt update && sudo apt install -y make clang gcc
          
          # FIX: Use NDK r21e (The only NDK perfectly compatible with older API 16 build scripts)
          wget https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          export NDK_PATH="$(pwd)/android-ndk-r21e"
          
          # Clone Media3 STABLE VERSION (1.2.0)
          git clone --branch 1.2.0 https://github.com/androidx/media.git
          cd media/libraries/decoder_ffmpeg/src/main/jni
          
          # Download FFmpeg 6.0
          wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.bz2
          tar -xf ffmpeg-6.0.tar.bz2
          mv ffmpeg-6.0 ffmpeg
          
          # Clean invalid flags
          sed -i 's/--disable-avresample//g' build_ffmpeg.sh
          
          # Compile FFmpeg raw files
          chmod +x build_ffmpeg.sh
          ./build_ffmpeg.sh "$(pwd)/.." $NDK_PATH "linux-x86_64" 21 ac3 eac3 flac alac
          
          # FINAL STEP: Link everything into libffmpeg.so
          cd ..
          $NDK_PATH/ndk-build APP_ABI="arm64-v8a" -j4
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libffmpeg-android
          path: media/libraries/decoder_ffmpeg/src/main/libs/


